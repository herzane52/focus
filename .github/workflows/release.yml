name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action automatically replaces this
          releaseName: "Focus v__VERSION__"
          releaseBody: "Focus uygulamasının yeni sürümü."
          releaseDraft: true
          prerelease: false
          args: --verbose

      - name: Upload Build Artifacts for Arch
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-output
          path: |
            build/target/release/focus-app
            build/target/release/bundle/deb/*.deb
          retention-days: 1

  build-arch:
    needs: build-linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel binutils

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-build-output
          path: build/target/release/

      - name: Prepare directory structure
        run: |
          mkdir -p build/target/release/bundle/deb
          mv build/target/release/*.deb build/target/release/bundle/deb/ || true

      - name: Build Arch Package
        run: |
          # makepkg cannot be run as root
          useradd -m builduser
          chown -R builduser:builduser .
          # Allow builduser to run pacman (for dependencies if any)
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          sudo -u builduser makepkg -sf --noconfirm

      - name: Upload Arch Package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  release:
    needs: [build-linux, build-arch]
    runs-on: ubuntu-latest
    steps:
      - name: Download Arch Package
        uses: actions/download-artifact@v4
        with:
          name: arch-package

      - name: Upload Arch Package to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./*.pkg.tar.zst
          tag_name: ${{ github.ref_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
