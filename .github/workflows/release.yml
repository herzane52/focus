name: Release

on:
  push:
    tags:
      - 'v*'

# Yazma izni ekle (Release oluşturabilmek için)
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            file \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      # deb ve appimage paketlerini üret ve GitHub Release'e yükle
      - name: Build & Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/build/target
          NO_STRIP: 1
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: v__VERSION__
          releaseName: "Focus v__VERSION__"
          releaseBody: "Focus uygulamasının yeni sürümü."
          releaseDraft: true
          prerelease: false
          args: --bundles deb

      # deb ve appimage artifact'larını aktar
      - name: Upload Build Artifacts for Linux
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-output
          path: |
            build/target/release/focus-app
            build/target/release/bundle/deb/*.deb
          retention-days: 1


      - name: Build Flatpak from deb
        run: |
          # Install flatpak tools
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          
          # Repackage the deb file
          mkdir -p build/flatpak
          DEB_PATH=$(ls build/target/release/bundle/deb/*.deb | head -n 1)
          cp "$DEB_PATH" build/flatpak/application.deb
          
          # Setup flathub and runtimes
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//50 org.gnome.Sdk//50
          
          # Build and bundle
          mkdir -p build/flatpak
          flatpak-builder --state-dir=build/flatpak/.flatpak-builder build/flatpak/build-dir tr.herzane.focus.yml --force-clean --repo=build/flatpak/repo
          VERSION=$(node -p "require('./package.json').version")
          flatpak build-bundle build/flatpak/repo Focus-v${VERSION}.flatpak tr.herzane.focus

      - name: Upload Linux Packages to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/target/release/bundle/deb/*.deb
            *.flatpak
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arch:
    needs: build-linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel binutils

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-build-output
          path: build/target/release/

      - name: Prepare directory structure
        run: |
          mkdir -p build/target/release/bundle/deb
          mv build/target/release/*.deb build/target/release/bundle/deb/ || true

      - name: Build Arch Package
        run: |
          # makepkg cannot be run as root
          useradd -m builduser
          chown -R builduser:builduser .
          # Allow builduser to run pacman (for dependencies if any)
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          sudo -u builduser makepkg -sf --noconfirm

      - name: Upload Arch Package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  release:
    needs: [build-linux, build-arch]
    runs-on: ubuntu-latest
    steps:
      - name: Download Arch Package
        uses: actions/download-artifact@v4
        with:
          name: arch-package

      - name: Upload Arch Package to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./*.pkg.tar.zst
          tag_name: ${{ github.ref_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
