name: Release

on:
  push:
    tags:
      - 'v*'

# Yazma izni ekle (Release oluşturabilmek için)
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2

      - name: Install frontend dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      # Sadece .deb üretir ve GitHub Release'e yükler
      - name: Build & Release Tauri App (deb only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/build/target
          NO_STRIP: 1
        with:
          tagName: v__VERSION__
          releaseName: "Focus v__VERSION__"
          releaseBody: "Focus uygulamasının yeni sürümü."
          releaseDraft: true
          prerelease: false
          args: --bundles deb

      # AppImage'ı ayrıca build et (EGL patch uygulayabilmek için)
      - name: Build AppImage
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/build/target
          NO_STRIP: 1
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri -- build --bundles appimage

      # AppRun script'ine EGL fix inject et ve AppImage'ı yeniden paketle
      - name: Patch AppImage (EGL fix)
        run: |
          APPIMAGE=$(find ${{ github.workspace }}/build/target/release/bundle/appimage -name "*.AppImage" | head -1)
          echo "Patching: $APPIMAGE"

          # AppImage'ı aç
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --appimage-extract
          
          # AppRun'a EGL fix env değişkenlerini ekle (shebang'dan sonraki ilk satıra)
          sed -i '/^#!.*/a \\n# EGL fix: disable DMA-BUF renderer (avoids EGL_BAD_PARAMETER crash)\nexport WEBKIT_DISABLE_DMABUF_RENDERER=1\nexport NO_AT_BRIDGE=1\nexport WEBKIT_FORCE_SANDBOX=0' squashfs-root/AppRun

          echo "--- Patched AppRun ---"
          cat squashfs-root/AppRun
          echo "----------------------"

          # appimagetool indir ve yeniden paketle
          wget -q -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      # Patch'lenmiş AppImage'ı Release'e yükle
      - name: Upload Patched AppImage to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/build/target/release/bundle/appimage/*.AppImage
          tag_name: ${{ github.ref_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Arch build için artifact aktar
      - name: Upload Build Artifacts for Arch
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-output
          path: |
            build/target/release/focus-app
            build/target/release/bundle/deb/*.deb
          retention-days: 1

  build-arch:
    needs: build-linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel binutils

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-build-output
          path: build/target/release/

      - name: Prepare directory structure
        run: |
          mkdir -p build/target/release/bundle/deb
          mv build/target/release/*.deb build/target/release/bundle/deb/ || true

      - name: Build Arch Package
        run: |
          # makepkg cannot be run as root
          useradd -m builduser
          chown -R builduser:builduser .
          # Allow builduser to run pacman (for dependencies if any)
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          sudo -u builduser makepkg -sf --noconfirm

      - name: Upload Arch Package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  release:
    needs: [build-linux, build-arch]
    runs-on: ubuntu-latest
    steps:
      - name: Download Arch Package
        uses: actions/download-artifact@v4
        with:
          name: arch-package

      - name: Upload Arch Package to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./*.pkg.tar.zst
          tag_name: ${{ github.ref_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
